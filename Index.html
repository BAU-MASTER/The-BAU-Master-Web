<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RE:BAU</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo-area">

            <img src="assets/logo.png"
                 alt="Logo"
                 class="logo">

            <div>

                <h1>RE:BAU MASTER</h1>

                <p id="projectName">
                    Loading...
                </p>

            </div>

        </div>

        <div class="header-right">

            <span id="currentDate"></span>

            <span class="divider"></span>

            <span id="roomName">Loading...</span>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ====== Statistics ====== -->

        <section class="stats">

            <div class="stat-card">

                <div class="stat-number"
                     id="statTimeline">
                    0
                </div>

                <div class="stat-label">
                    Timeline
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-number"
                     id="statAssets">
                    0
                </div>

                <div class="stat-label">
                    Assets
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-number"
                     id="statVideos">
                    0
                </div>

                <div class="stat-label">
                    Videos
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-number"
                     id="statBackground">
                    0
                </div>

                <div class="stat-label">
                    Backgrounds
                </div>

            </div>

        </section>

        <!-- ====== Content ====== -->

        <section class="content">

            <!-- LEFT -->

            <div class="left-panel">

                <div class="card">

                    <div class="card-header">

                        <h2>
                            Background Gallery
                        </h2>

                    </div>

                    <div id="gallery"
                         class="gallery">

                        <!-- JS Render -->

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="right-panel">

                <!-- General -->

                <div class="card">

                    <div class="card-header">

                        <h2>
                            Thông tin chung
                        </h2>

                    </div>

                    <div class="info-list">

                        <div class="info-row">

                            <label>Brand</label>

                            <span id="brand"></span>

                        </div>

                        <div class="info-row">

                            <label>Campaign</label>

                            <span id="campaign"></span>

                        </div>

                        <div class="info-row">

                            <label>Room</label>

                            <span id="room"></span>

                        </div>

                        <div class="info-row">

                            <label>Agency</label>

                            <span id="agency"></span>

                        </div>

                        <div class="info-row">

                            <label>Producer</label>

                            <span id="producer"></span>

                        </div>

                        <div class="info-row">

                            <label>Status</label>

                            <span id="status"></span>

                        </div>

                        <div class="info-row">

                            <label>Drive</label>

                            <a id="driveLink"
                               target="_blank">
                                Open
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- ===== Timeline ===== -->

        <section class="timeline-section">

            <div class="card">

                <div class="card-header">

                    <h2>
                        Timeline
                    </h2>

                </div>

                <div class="timeline-wrapper">

                    <table class="timeline-table">

                        <thead>

                            <tr>

                                <th>Time</th>

                                <th>Content</th>

                                <th>Duration</th>

                                <th>Type</th>

                                <th>Status</th>

                            </tr>

                        </thead>

                        <tbody id="timelineBody">

                            <!-- Render -->

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

    <!-- ================= LOADING ================= -->

    <div id="loading"
         class="loading">

        <div class="spinner"></div>

        <p>Loading...</p>

    </div>

    <!-- ================= IMAGE PREVIEW ================= -->

    <div id="imageModal"
         class="modal">

        <span id="closeModal"
              class="close">

            &times;

        </span>

        <img id="modalImage">

    </div>

    <!-- ================= TOAST ================= -->

    <div id="toast"
         class="toast">

    </div>

    <!-- ================= SCRIPT ================= -->

    <script type="module" src="js/app.js"></script>

</body>

</html>
